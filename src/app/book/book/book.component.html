<div>
  <input type="text" (input)="updateBookSearchTerm($event)" placeholder="Suche">
</div>

<div class="book-list">
  @for (book of (books$ | async) | bookFilter: bookSearchTerm; track book.isbn) {
    <app-book-card
      [content]="book"
      (detailClick)="goToBookDetails($event)"
    />
  }
</div>
