<div>
  <input type="text" (input)="updateBookSearchTerm($event)" placeholder="Suche">
</div>

<div class="book-list">
  @let books = books$ | async;
  <div>Total books: {{ books?.length }}</div>
  @for (book of books | bookFilter: bookSearchTerm; track book.isbn) {
    <app-book-card
      [content]="book"
      (detailClick)="goToBookDetails($event)"
    />
  }
</div>
